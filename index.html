<style>

.vp{background:var(--red);color:#fff;font-weight:700;border-radius:3px;padding:1px 5px}

.rule-name{font-size:13px;font-weight:500}
.rule-desc{font-size:11px;color:var(--g400);margin-top:2px}

<body>
<div id="root"></div>
<script>
const SHEET_ID = '14x_SIrv0rS54yKLkdq-34-dZ9ecRqiLr-rM4QmUq7VY';
const DECISOES_ID = '1M_nYJWtPCn1r11B3HCUcmB-6NklBleKRSfug7MHNufw';
const DECISOES_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzQL4WTEfABgFdna0PJEW5xot4snorxzKDLaKTnpw9GMyJDBI4QUVgkQ1CRowQX9RrV/exec';
const USERS = {
  'adm@jpower.pt': { password: 'jpower2026', role: 'ADM', name: 'David Castro' },
  'dcc@jpower.pt': { password: 'dcc2026', role: 'DCC', name: 'Dep. Cobranças' }
};
const EMPRESAS_FIXAS = {
  '001':'SGPS','002':'Auto Julio, SA','003':'AJ Leiria','004':'AJ Soluções',
  '006':'AJ Rent','007':'AJ Imobiliária','008':'AJ Tec','009':'G Caldas',
  '010':'AJ Ocasião','011':'AJ Mediação','012':'JPower','013':'AJ II',
  '014':'Alferpac','017':'Fortclima','701':'BForce','703':'Nobreoeste'
};
const EMPRESAS_LISTA = Object.values(EMPRESAS_FIXAS);

let state = {
  user:null, tab:'pipeline',
  pendentes:[], plafond:[], encAutoriz:[], encFaturar:[], vendedores:[],
  loading:false, dataLoaded:false, loadErr:null,
  nifAnalise:'', analiseData:null, searchResults:null,
  decisoes:[], revisoes:[], decisoesLoaded:false, antigFilter:null,
  dccConfig: { limiteValor: 3500, limiteDias: 3 },
  emailConfig: { emailPHC: '', emailTeste: '', modoTeste: 'NAO', emailADM: 'adm@jpower.pt', emailDCC: 'dcc@jpower.pt' },
  modal:null, pipeline:[]
};

// ── SHEETS ──────────────────────────────────────────────────────────────────
async function loadSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}&t=${Date.now()}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} ao carregar ${name}`);
  const txt = await r.text();
  if (txt.includes('signin') || txt.includes('ServiceLogin')) throw new Error(`Sem acesso à folha ${name}`);
  return parseCSV(txt);
}

function parseCSV(txt) {
  const lines = txt.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(h => h.trim().replace(/[\r\n\u00a0\ufeff]/g,''));
  const validHeaders = headers.filter(h => h.length > 0);
  return lines.slice(1).map(l => {
    const vals = parseCSVLine(l);
    const obj = {};
    headers.forEach((h,i) => {
      if (h) obj[h] = (vals[i]||'').trim().replace(/[\r\n]/g,'');
    });
    return obj;
  }).filter(o => Object.values(o).some(v => v !== ''));
}

function parseCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

async function loadDecisoesData() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${DECISOES_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('Decisoes')}&t=${Date.now()}`;
    const r = await fetch(url);
    const txt = await r.text();
    state.decisoes = parseCSV(txt);

    const url2 = `https://docs.google.com/spreadsheets/d/${DECISOES_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('Revisoes')}&t=${Date.now()}`;
    const r2 = await fetch(url2);
    const txt2 = await r2.text();
    state.revisoes = parseCSV(txt2);
    
    state.decisoesLoaded = true;
  } catch(e) {
    console.warn('Decisoes nao carregadas:', e);
  }
}

async function writeDecisao(payload) {
  if (!DECISOES_SCRIPT_URL || DECISOES_SCRIPT_URL.includes('COLOCA')) {
    return true;
  }
  try {
    const r = await fetch(DECISOES_SCRIPT_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ ...payload, token: 'JPOWER2026' })
    });
    const txt = await r.text();
    try {
      const data = JSON.parse(txt);
      console.log('writeDecisao response:', data);
      return data.ok;
    } catch(e2) {
      console.log('writeDecisao raw:', txt);
      return txt.includes('"ok":true');
    }
  } catch(e) {
    console.error('Erro ao escrever decisao:', e);
    return false;
  }
}

async function loadAllData() {
  state.loading = true; state.loadErr = null; render();
  try {
    const [pend, plaf, encA, encF, vend] = await Promise.all([
      loadSheet('Pendentes'), loadSheet('Plafond'),
      loadSheet('Enc Autoriz'), loadSheet('Enc Faturar'),
      loadSheet('Vendedores')
    ]);
    state.pendentes = pend;
    state.plafond = plaf;
    state.encAutoriz = encA;
    state.encFaturar = encF;
    state.vendedores = vend;
    state.pipeline = buildPipeline(encA);
    state.dataLoaded = true;
    await loadDecisoesData();
    mergePipelineStates();
  } catch(e) {
    state.loadErr = e.message;
    console.error(e);
  }
  state.loading = false; render();
}

function getVendedorEmail(enc) {
  if (!enc) return '';
  const vend = state.vendedores.find(v => (v.Vendedor||Object.values(v)[0]||'').trim() === enc.vendedor.trim());
  if (!vend) return state.emailConfig.emailTeste || '';
  const email = vend.email || Object.values(vend)[1] || '';
  return email || state.emailConfig.emailTeste || '';
}

function empNome(cod) {
  const c = String(cod).trim().padStart(3,'0');
  return EMPRESAS_FIXAS[c] || EMPRESAS_FIXAS[String(cod).trim()] || cod;
}

function mergePipelineStates() {
  state.pipeline.forEach(e => {
    const dec = state.decisoes.find(d => String(d.n_encomenda||'').trim() === String(e.n_enc||'').trim());
    if (dec && dec.estado) {
      e.estado = (dec.estado||'').trim();
      e.motivo_recusa = dec.motivo_recusa || '';
      e.auth_manual_phc = dec.auth_manual_phc || '';
      // If approved and PHC confirmed, update state
      if (dec.estado === 'aprovada' && dec.auth_manual_phc && dec.auth_manual_phc.trim() !== '') {
        e.estado = 'aprovada_phc';
        e.auth_manual_phc = dec.auth_manual_phc;
      }
    }
    const rev = state.revisoes.find(r => String(r.n_encomenda||'').trim() === String(e.n_enc||'').trim());
    if (rev) {
      e.revisao = rev;
      }
    if (e.estado === 'em_revisao') {
      }
  });
}

function dccPodeAprovar(enc) {
  // Check DCC approval conditions for a pipeline entry
  const a = calcAnalise(enc.nif);
  const limiteValor = state.dccConfig.limiteValor;
  const limiteDias = state.dccConfig.limiteDias;
  
  // Condition 1: PlafondSeguro > PlafondNecessario
  if (a.totais.plafSeg < a.totais.plafNec) return false;
  
  // Condition 2: PlafondNecessario <= limite configurado
  if (a.totais.plafNec > limiteValor) return false;
  
  // Condition 3: Sem facturas vencidas acima do limite de dias
  const temVencidas = state.pendentes.filter(r =>
    (r.NIF||'').trim() === enc.nif.trim() &&
    parseInt(r.Dias_Venc||0) > limiteDias
  ).length > 0;
  if (temVencidas) return false;
  
  return true;
}

function buildPipeline(encA) {
  const groups = {};
  encA.forEach(r => {
    const key = (r.N_Encomenda||'').trim();
    if (!key) return;
    if (!groups[key]) {
      groups[key] = {
        n_enc: key,
        empresa: empNome(r.Empresa||''),
        data: (r.DataEntrega||r.DataEncomenda||'').substring(0,10),
        nif: (r.NIF||'').trim(),
        nome: (r.nome||r.Nome||'').trim(),
        vendedor: (r.Vendedor||'').trim(),
        valor: 0, estado: 'por_autorizar', linhas: []
      };
    }
    groups[key].valor += parseFloat((r.Valor||'0').replace(',','.')) || 0;
    groups[key].linhas.push(r);
  });
  return Object.values(groups).sort((a, b) => {
    // 1. Data Entrega
    if (a.data < b.data) return -1;
    if (a.data > b.data) return 1;
    // 2. NIF
    if (a.nif < b.nif) return -1;
    if (a.nif > b.nif) return 1;
    // 3. Nº Encomenda
    return String(a.n_enc).localeCompare(String(b.n_enc), undefined, {numeric: true});
  });
}

// ── ANALISE ─────────────────────────────────────────────────────────────────
function calcAnalise(nif) {
  const n = nif.trim();
  const pend = state.pendentes.filter(r => (r.NIF||'').trim() === n);
  const plaf = state.plafond.filter(r => (r.ncont||'').trim() === n);
  const encA = state.encAutoriz.filter(r => (r.NIF||'').trim() === n);
  const encF = state.encFaturar.filter(r => (r.NIF||'').trim() === n);
  const nome = pend.length > 0 ? (pend[0].Nome||'') : '';
  const classif = pend.length > 0 ? (pend[0].Classificacao||'') : '';

  const empresaData = EMPRESAS_LISTA.map(emp => {
    const pE = pend.filter(r => empNome(r.EMP||'') === emp);
    const plE = plaf.filter(r => empNome(r.EMP||'') === emp);
    const aE = encA.filter(r => empNome(r.Empresa||'') === emp);
    const fE = encF.filter(r => empNome(r.Empresa||'') === emp);
    const plafAprov = plE.reduce((s,r) => s + (parseFloat((r['SOMA Plafonds']||r.Plafond||'0').replace(',','.')) || 0), 0);
    const plafSeg = plE.reduce((s,r) => s + (parseFloat((r['Plafond Seguro']||'0').replace(',','.')) || 0), 0);
    const seg = plE.length > 0 ? (plE[0].Seguradora||'') : '';
    const cc = pE.reduce((s,r) => s + (parseFloat((r.Pendente||'0').replace(',','.')) || 0), 0);
    const encVal = aE.reduce((s,r) => s + (parseFloat((r.Valor||'0').replace(',','.')) || 0), 0);
    const fatVal = fE.reduce((s,r) => s + (parseFloat((r.Valor||'0').replace(',','.')) || 0), 0);
    const plafNec = cc + encVal + fatVal;
    const segUpper = (seg||"").toUpperCase().trim();
    let risco = 0;
    if (segUpper === "CYC" || segUpper === "CYC.") {
      risco = plafNec > plafSeg ? plafSeg * 0.15 + (plafNec - plafSeg) : plafNec * 0.15;
    } else if (segUpper === "COSEC") {
      risco = plafNec > plafSeg ? plafSeg * 0.10 + (plafNec - plafSeg) : plafNec * 0.10;
    } else {
      risco = plafNec;
    }
    return { emp, plafAprov, plafSeg, seg, cc, encVal, fatVal, plafNec, risco };
  }).filter(e => e.cc>0||e.encVal>0||e.fatVal>0||e.plafAprov>0);

  const totais = empresaData.reduce((t,e) => ({
    plafAprov:t.plafAprov+e.plafAprov, plafSeg:t.plafSeg+e.plafSeg,
    cc:t.cc+e.cc, encVal:t.encVal+e.encVal, fatVal:t.fatVal+e.fatVal,
    plafNec:t.plafNec+e.plafNec, risco:t.risco+e.risco
  }), {plafAprov:0,plafSeg:0,cc:0,encVal:0,fatVal:0,plafNec:0,risco:0});

  const vencido = pend.filter(r => parseInt(r.Dias_Venc||'0') > 0)
    .reduce((s,r) => s + (parseFloat((r.Pendente||'0').replace(',','.')) || 0), 0);

  const docs = [...pend].sort((a,b) => parseInt(b.Dias_Venc||0) - parseInt(a.Dias_Venc||0));
  return { nif:n, nome, classif, empresaData, totais, vencido, docs };
}

// ── FORMAT ──────────────────────────────────────────────────────────────────
function fmt2(v) {
  if (!v || v === 0) return '—';
  return new Intl.NumberFormat('pt-PT',{minimumFractionDigits:0,maximumFractionDigits:0}).format(v) + ' €';
}
function fmt(v) {
  if (!v || v === 0) return '—';
  return new Intl.NumberFormat('pt-PT',{minimumFractionDigits:0,maximumFractionDigits:0}).format(v) + ' €';
}
function fmtDec(v) {
  if (!v || v === 0) return '—';
  return new Intl.NumberFormat('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}).format(v) + ' €';
}
function badgeClass(e) { return {por_autorizar:'b-pending',aprovada:'b-approved',aprovada_phc:'b-phc',recusada:'b-refused',em_revisao:'b-review'}[e]||'b-pending'; }
function badgeLabel(e) { return {por_autorizar:'Por Autorizar',aprovada:'Aprovada — Pendente PHC',aprovada_phc:'Aprovada — PHC Confirmado',recusada:'Recusada',em_revisao:'Em Revisão'}[e]||e; }
function classColor(c) {
  const u=(c||'').toUpperCase();
  if(u==='BOM'||u==='BOA') return '#16a34a';
  if(u==='REGULAR') return '#d97706';
  if(u==='RISCO') return '#ea580c';
  if(u==='BLOQUEADO'||u==='BLOQUEADA') return '#dc2626';
  return '#6b7280';
}

function renderAnaliseRevisao(d) {
  if (!d || !d.nif) return '';
  // Find pipeline entries for this NIF with em_revisao
  const encs = state.pipeline.filter(p => p.nif === d.nif && p.estado === 'em_revisao' && p.revisao);
  if (encs.length === 0) return '';
  const isDCC = state.user.role === 'DCC';

  const dialogs = encs.map(e => {
    const rev = e.revisao;
    const aguarda = rev.estado === 'pendente' && ((!rev.resposta_1 && rev.questao_1) || (!rev.resposta_2 && rev.questao_2));
    return `<div style="margin-bottom:10px;padding:12px 14px;background:#f0f7ff;border-radius:var(--r);border:1px solid var(--accent-soft)">
      <div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:8px">Enc. ${e.n_enc} — ${e.empresa} — ${fmt2(e.valor)}</div>
      ${rev.questao_1?`<div style="font-size:11px;margin-bottom:4px"><span style="font-weight:700;color:var(--navy-mid)">Questão ADM:</span> ${rev.questao_1} <span style="color:var(--g400);font-size:10px">${rev.data_q1||''}</span></div>`:''}
      ${rev.resposta_1?`<div style="font-size:11px;padding-left:12px;border-left:2px solid var(--green);margin-bottom:4px"><span style="font-weight:700;color:var(--green)">Resposta DCC:</span> ${rev.resposta_1} <span style="color:var(--g400);font-size:10px">${rev.data_r1||''}</span></div>`:''}
      ${rev.questao_2?`<div style="font-size:11px;margin-bottom:4px"><span style="font-weight:700;color:var(--navy-mid)">Questão ADM (2ª):</span> ${rev.questao_2}</div>`:''}
      ${rev.resposta_2?`<div style="font-size:11px;padding-left:12px;border-left:2px solid var(--green);margin-bottom:4px"><span style="font-weight:700;color:var(--green)">Resposta DCC (2ª):</span> ${rev.resposta_2}</div>`:''}
      ${isDCC && aguarda?`<div style="display:flex;gap:8px;align-items:flex-start;margin-top:8px">
        <textarea id="resp-analise-${e.n_enc}" rows="2" style="flex:1;padding:7px 10px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--font);font-size:12px;outline:none;resize:vertical" placeholder="Escreve a tua resposta..."></textarea>
        <button class="btn btn-success btn-sm" data-action="responder" data-enc="${e.n_enc}">Responder</button>
      </div>`:''}
    </div>`;
  }).join('');

  return `<div class="sec-bar" style="border-top:1px solid var(--g200)">Diálogo de Revisão</div>
    <div style="padding:14px 16px;background:#fff;border:1px solid var(--g200);border-top:none">${dialogs}</div>`;
}

function renderAntiguidade() {
  const INTERVALS = [
    '0 | Não vencido','A | < 10 dias','B | 10 <> 30 dias',
    'C | 30 <> 60 dias','D | 60<>120 dias','E | > 120 dias'
  ];
  const INT_COLORS = ['#dcfce7','#fef9c3','#fef3c7','#fed7aa','#fecaca','#fca5a5'];
  const INT_TEXT = ['#16a34a','#ca8a04','#d97706','#ea580c','#dc2626','#b91c1c'];

  // Build unique company list and vendor list for filters
  const allEmpresas = [...new Set(state.pendentes.map(r=>empNome(r.EMP||'')))].filter(Boolean).sort();
  const allVendedores = [...new Set(state.pendentes.map(r=>r.Vendedor||''))].filter(Boolean).sort();

  const fEmp = state.antigFilter?.emp || '';
  const fAntig = state.antigFilter?.antig || '';
  const fVend = state.antigFilter?.vend || '';

  // Filter pendentes
  let pend = state.pendentes;
  if (fEmp) pend = pend.filter(r => empNome(r.EMP||'') === fEmp);
  if (fAntig) pend = pend.filter(r => (r.Antig_Saldo||'').trim() === fAntig);
  if (fVend) pend = pend.filter(r => (r.Vendedor||'').trim() === fVend);

  // Group by NIF + empresa
  const groups = {};
  pend.forEach(r => {
    const nif = (r.NIF||'').trim();
    const emp = empNome(r.EMP||'');
    const key = nif + '|' + emp;
    if (!groups[key]) {
      groups[key] = { nome: r.Nome||'', nif, emp, totals: {}, total: 0 };
      INTERVALS.forEach(iv => { groups[key].totals[iv] = 0; });
      groups[key].totals['(em branco)'] = 0;
    }
    const iv = (r.Antig_Saldo||'').trim();
    const v = parseFloat((r.Pendente||'0').replace(',','.')) || 0;
    if (INTERVALS.includes(iv)) {
      groups[key].totals[iv] += v;
    } else {
      groups[key].totals['(em branco)'] = (groups[key].totals['(em branco)'] || 0) + v;
    }
    groups[key].total += v;
  });

  const rows = Object.values(groups)
    .filter(g => g.total !== 0)
    .sort((a,b) => b.total - a.total)
    .map((g, i) => {
      const bg = i%2===0 ? '#f9fafb' : '#fff';
      const cells = INTERVALS.map((iv, idx) => {
        const v = g.totals[iv] || 0;
        if (v === 0) return `<td class="r" style="background:${bg};color:var(--g300)">—</td>`;
        return `<td class="r" style="background:${INT_COLORS[idx]};color:${INT_TEXT[idx]};font-weight:500">${fmt(v)}</td>`;
      });
      const blank = g.totals['(em branco)'] || 0;
      const totalColor = g.total < 0 ? 'color:var(--red)' : '';
      return `<tr>
        <td style="background:${bg};font-weight:500">
          <a href="#" class="link-antig-analise" data-nif="${g.nif}" style="color:var(--navy);text-decoration:none;font-weight:600">${g.nome}</a>
        </td>
        <td style="background:${bg};font-family:var(--mono);font-size:10px;color:var(--g400)">${g.nif}</td>
        <td style="background:${bg}">${g.emp}</td>
        ${cells.join('')}
        <td class="r" style="background:${bg};color:var(--g400)">${blank ? fmt(blank) : '—'}</td>
        <td class="r" style="background:${bg};font-weight:700;${totalColor}">${fmt(g.total)}</td>
      </tr>`;
    }).join('');

  // Totals row
  const colTotals = {};
  INTERVALS.forEach(iv => { colTotals[iv] = 0; });
  colTotals['(em branco)'] = 0;
  let grandTotal = 0;
  Object.values(groups).forEach(g => {
    INTERVALS.forEach(iv => { colTotals[iv] += g.totals[iv] || 0; });
    colTotals['(em branco)'] += g.totals['(em branco)'] || 0;
    grandTotal += g.total;
  });
  const totalCells = INTERVALS.map((iv,idx) => `<td class="r" style="font-weight:700;background:${INT_COLORS[idx]};color:${INT_TEXT[idx]}">${colTotals[iv] ? fmt(colTotals[iv]) : '—'}</td>`).join('');

  const nRows = Object.values(groups).filter(g=>g.total!==0).length;

  return `
  <div class="card" style="margin-bottom:12px">
    <div class="card-hd"><span class="card-title">Filtros</span></div>
    <div style="padding:12px 16px;display:flex;gap:12px;flex-wrap:wrap">
      <div>
        <label style="font-size:10px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px">Empresa</label>
        <select id="f-emp" style="padding:7px 10px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--font);font-size:12px;outline:none;min-width:160px">
          <option value="">Todas</option>
          ${allEmpresas.map(e=>`<option value="${e}" ${fEmp===e?'selected':''}>${e}</option>`).join('')}
        </select>
      </div>
      <div>
        <label style="font-size:10px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px">Antiguidade</label>
        <select id="f-antig" style="padding:7px 10px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--font);font-size:12px;outline:none;min-width:180px">
          <option value="">Todos</option>
          ${INTERVALS.map(iv=>`<option value="${iv}" ${fAntig===iv?'selected':''}>${iv}</option>`).join('')}
        </select>
      </div>
      <div>
        <label style="font-size:10px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px">Vendedor</label>
        <select id="f-vend" style="padding:7px 10px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--font);font-size:12px;outline:none;min-width:160px">
          <option value="">Todos</option>
          ${allVendedores.map(v=>`<option value="${v}" ${fVend===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:flex-end;gap:6px">
        <button class="btn btn-primary btn-sm" id="btn-filtrar-antig">Filtrar</button>
        <button class="btn btn-ghost btn-sm" id="btn-limpar-antig">Limpar</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">
      <span class="card-title">Antiguidade de Saldos</span>
      <span style="font-size:11px;color:var(--g400)">${nRows} cliente(s)</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Cliente</th><th>NIF</th><th>Empresa</th>
          ${INTERVALS.map((iv,i)=>`<th class="r" style="background:${INT_COLORS[i]};color:${INT_TEXT[i]}">${iv}</th>`).join('')}
          <th class="r" style="color:var(--g400)">(em branco)</th>
          <th class="r">Total Geral</th>
        </tr></thead>
        <tbody>
          ${rows || '<tr><td colspan="11" style="text-align:center;padding:30px;color:var(--g400)">Sem dados</td></tr>'}
          <tr style="border-top:2px solid var(--navy-mid)">
            <td colspan="3" style="font-weight:700;background:#e8edf5">Total Geral</td>
            ${totalCells}
            <td class="r" style="background:#e8edf5;font-weight:700">${colTotals['(em branco)'] ? fmt(colTotals['(em branco)']) : '—'}</td>
            <td class="r" style="background:#e8edf5;font-weight:700">${fmt(grandTotal)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

      <div class="modal">
        <div class="modal-title">Pedir Revisão ao DCC</div>
        <div class="modal-field"><label>Pergunta para o DCC</label>
          <textarea id="m-questao" rows="3" placeholder="Ex: Qual a previsão de pagamento das facturas em atraso?"></textarea></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="m-cancel">Cancelar</button>
          <button class="btn btn-accent" id="m-confirm">Enviar para DCC</button>
        </div>
      </div>
    </div>`;
  return '';
}

// ── EVENTS ──────────────────────────────────────────────────────────────────
function attachEvents() {
  const $=id=>document.getElementById(id);
  const lBtn=$('l-btn');
  if(lBtn) lBtn.onclick=()=>{
    const email=($('l-email')||{}).value.trim().toLowerCase();
    const pass=($('l-pass')||{}).value;
    const u=USERS[email];
    if(u&&u.password===pass){ state.user={email,role:u.role,name:u.name}; state.tab='pipeline'; loadAllData(); }
    else { ($('l-err')||{}).textContent='Credenciais inválidas.'; }
  };
  ['l-email','l-pass'].forEach(id=>{ const el=$(id); if(el) el.onkeydown=e=>{ if(e.key==='Enter') lBtn&&lBtn.click(); }; });

  const lo=$('btn-logout');
  if(lo) lo.onclick=()=>{ state.user=null; state.dataLoaded=false; state.pipeline=[]; render(); };

  const retry=$('btn-retry');
  if(retry) retry.onclick=()=>loadAllData();

  const refresh=$('btn-refresh');
  if(refresh) refresh.onclick=async ()=>{
    await loadAllData();
  };

  document.querySelectorAll('.nav-tab').forEach(t=>{ t.onclick=()=>{ state.tab=t.dataset.tab; render(); }; });

  const nifBtn=$('btn-pesquisar');
  if(nifBtn) nifBtn.onclick=()=>{
    const v=(($('nif-input')||{}).value||'').trim();
    if(!v) return;
    // Check if it looks like a NIF (all digits)
    if(/^\d{5,9}$/.test(v)){
      state.nifAnalise=v; state.analiseData=calcAnalise(v); state.searchResults=null; render();
    } else {
      // Search by name with wildcard support
      const q=v.toLowerCase().replace(/\*/g,'.*');
      const regex=new RegExp('^'+q, 'i');
      const matches=[...new Map(state.pendentes
        .filter(r=>regex.test((r.Nome||'').toLowerCase()))
        .map(r=>[r.NIF, {nif:r.NIF, nome:r.Nome}])).values()].slice(0,15);
      if(matches.length===1){ state.nifAnalise=matches[0].nif; state.analiseData=calcAnalise(matches[0].nif); state.searchResults=null; }
      else if(matches.length>1){ state.searchResults=matches; state.analiseData=null; }
      else { state.searchResults=[]; state.analiseData=null; }
      render();
    }
  };
  const nifInput=$('nif-input');
  if(nifInput) nifInput.onkeydown=e=>{ if(e.key==='Enter') nifBtn&&nifBtn.click(); };
  const limpar=$('btn-limpar-nif');
  if(limpar) limpar.onclick=()=>{ state.nifAnalise=''; state.analiseData=null; state.searchResults=null; render(); };
  document.querySelectorAll('.search-result-item').forEach(item=>{
    item.onclick=()=>{ const nif=item.dataset.nif; state.nifAnalise=nif; state.analiseData=calcAnalise(nif); state.searchResults=null; render(); };
  });

  document.querySelectorAll('.link-analise').forEach(a=>{
    a.onclick=e=>{ e.preventDefault(); const nif=a.dataset.nif; state.tab='analise'; state.nifAnalise=nif; state.analiseData=calcAnalise(nif); render(); };
  });

  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.onclick=()=>{
      const action=btn.dataset.action, enc=btn.dataset.enc, nif=btn.dataset.nif;
      const nome=btn.dataset.nome||'', empresa=btn.dataset.empresa||'';
      const valor=btn.dataset.valor||'', vendedor=btn.dataset.vendedor||'';
      if(action==='analise'){ state.tab='analise'; state.nifAnalise=nif; state.analiseData=calcAnalise(nif); render(); }
      else if(action==='aprovar'){
        updateEstado(enc,'aprovada');
        writeDecisao({action:'decisao',n_encomenda:enc,empresa,nif,nome,valor,estado:'aprovada',tipo_aprovacao:'manual',utilizador:state.user.name,vendedor_email:getVendedorEmail(state.pipeline.find(p=>p.n_enc===enc)),email_phc:state.emailConfig.emailPHC,email_dcc:state.emailConfig.emailDCC,email_adm:state.emailConfig.emailADM,email_teste:state.emailConfig.emailTeste,modo_teste:state.emailConfig.modoTeste});
      }
      else if(action==='recusar'){ state.modal={type:'recusar',enc,nif,nome,empresa,valor}; render(); }
      else if(action==='revisao'){ state.modal={type:'revisao',enc,nif,nome,empresa,valor,vendedor,ronda:1}; render(); }
      else if(action==='revisao2'){ state.modal={type:'revisao',enc,nif,nome,empresa,valor,vendedor,ronda:2}; render(); }
      else if(action==='confirmar_phc'){
        const now = new Date().toLocaleString('pt-PT');
        const authVal = now + ' — ' + state.user.name;
        const enc2 = state.pipeline.find(p=>p.n_enc===enc);
        if(enc2){ enc2.estado='aprovada_phc'; enc2.auth_manual_phc=authVal; }
        writeDecisao({
          action:'confirmar_phc',
          n_encomenda:enc,
          auth_manual_phc:authVal,
          utilizador:state.user.name
        });
        render();
      }
      else if(action==='responder'){
        const textarea=document.getElementById('resp-'+enc);
        const resposta=(textarea||{}).value||'';
        if(!resposta.trim()){ alert('Escreve a resposta antes de submeter.'); return; }
        writeDecisao({action:'revisao_resposta',n_encomenda:enc,resposta,utilizador:state.user.name,email_adm:state.emailConfig.emailADM,email_teste:state.emailConfig.emailTeste,modo_teste:state.emailConfig.modoTeste});
        const rev=state.pipeline.find(p=>p.n_enc===enc);
        if(rev){ if(!rev.revisao) rev.revisao={}; if(!rev.revisao.resposta_1){ rev.revisao.resposta_1=resposta; rev.revisao.data_r1=new Date().toLocaleString('pt-PT'); } else { rev.revisao.resposta_2=resposta; rev.revisao.data_r2=new Date().toLocaleString('pt-PT'); } rev.revisao.estado='respondida'; }
        render();
      }
    };
  });

  const autoBtn=$('btn-auto');
  if(autoBtn) autoBtn.onclick=async ()=>{
    autoBtn.disabled=true;
    autoBtn.textContent='A processar...';
    let count=0;
    const promises=[];
    state.pipeline.forEach(e=>{
      if(e.estado!=='por_autorizar') return;
      const a=calcAnalise(e.nif);
      const vencHa3=state.pendentes.filter(r=>(r.NIF||'').trim()===e.nif.trim()&&parseInt(r.Dias_Venc||0)>3).length>0;
      const semRisco=a.totais.plafNec<=a.totais.plafAprov;
      if(semRisco&&!vencHa3){
        e.estado='aprovada';
        count++;
        promises.push(writeDecisao({
          action:'decisao',
          n_encomenda:e.n_enc,
          empresa:e.empresa,
          nif:e.nif,
          nome:e.nome,
          valor:String(e.valor),
          estado:'aprovada',
          tipo_aprovacao:'automatica',
          utilizador:state.user.name,
          motivo_recusa:''
        }));
      }
    });
    await Promise.all(promises);
    autoBtn.disabled=false;
    autoBtn.textContent='⚡ Aprovação Automática';
    alert('Aprovação automática: ' + count + ' encomenda(s) aprovada(s) e gravada(s) no Sheets.');
    render();
  };

  const btnPrint=$('btn-print-analise');
  if(btnPrint) btnPrint.onclick=()=>{ window.print(); };
  const btnAprA=$('btn-aprovar-analise');
  if(btnAprA) btnAprA.onclick=()=>{
    const d=state.analiseData;
    if(!d) return;
    const encs=state.pipeline.filter(p=>p.nif===d.nif&&p.estado==='por_autorizar');
    if(encs.length===0){ alert('Sem encomendas por autorizar para este cliente.'); return; }
    if(encs.length===1){
      state.modal={type:'aprovar',enc:encs[0].n_enc,nif:encs[0].nif,nome:encs[0].nome,empresa:encs[0].empresa,valor:String(encs[0].valor)};
    } else {
      state.modal={type:'selecionar',accao:'aprovar',encs,nif:d.nif};
    }
    render();
  };
  const btnRecA=$('btn-recusar-analise');
  if(btnRecA) btnRecA.onclick=()=>{
    const d=state.analiseData;
    if(!d) return;
    const encs=state.pipeline.filter(p=>p.nif===d.nif&&p.estado==='por_autorizar');
    if(encs.length===0){ alert('Sem encomendas por autorizar para este cliente.'); return; }
    if(encs.length===1){
      state.modal={type:'recusar',enc:encs[0].n_enc,nif:encs[0].nif,nome:encs[0].nome,empresa:encs[0].empresa,valor:String(encs[0].valor)};
    } else {
      state.modal={type:'selecionar',accao:'recusar',encs,nif:d.nif};
    }
    render();
  };
  const btnRevA=$('btn-revisao-analise');
  if(btnRevA) btnRevA.onclick=()=>{
    const d=state.analiseData;
    if(!d) return;
    const encs=state.pipeline.filter(p=>p.nif===d.nif&&(p.estado==='por_autorizar'||p.estado==='em_revisao'));
    if(encs.length===0){ alert('Sem encomendas activas para este cliente.'); return; }
    if(encs.length===1){
      state.modal={type:'revisao',enc:encs[0].n_enc,nif:encs[0].nif,nome:encs[0].nome,empresa:encs[0].empresa,valor:String(encs[0].valor),vendedor:encs[0].vendedor,ronda:1};
    } else {
      state.modal={type:'selecionar',accao:'revisao',encs,nif:d.nif};
    }
    render();
  };

  const mCancel=$('m-cancel');
  if(mCancel) mCancel.onclick=()=>{ state.modal=null; render(); };
  const mConfirm=$('m-confirm');
  if(mConfirm) mConfirm.onclick=async ()=>{
    const m=state.modal;
    if(m.type==='recusar_batch'){
      const motivo=($('m-motivo')||{}).value||'';
      if(!motivo.trim()){ alert('O motivo é obrigatório.'); return; }
      const promises=m.encs.map(enc_sel=>{
        const e=state.pipeline.find(p=>p.n_enc===enc_sel);
        if(!e) return;
        updateEstado(enc_sel,'recusada');
        return writeDecisao({action:'decisao',n_encomenda:enc_sel,empresa:e.empresa,nif:e.nif,nome:e.nome,valor:String(e.valor),estado:'recusada',tipo_aprovacao:'manual',utilizador:state.user.name,motivo_recusa:motivo,vendedor_email:getVendedorEmail(e),email_phc:state.emailConfig.emailPHC,email_dcc:state.emailConfig.emailDCC,email_adm:state.emailConfig.emailADM,email_teste:state.emailConfig.emailTeste,modo_teste:state.emailConfig.modoTeste});
      });
      await Promise.all(promises);
      state.modal=null; render();
      return;
    }
    if(m.type==='aprovar'){
      const comentario=($('m-comentario')||{}).value||'';
      updateEstado(m.enc,'aprovada');
      writeDecisao({action:'decisao',n_encomenda:m.enc,empresa:m.empresa||'',nif:m.nif||'',nome:m.nome||'',valor:m.valor||'',estado:'aprovada',tipo_aprovacao:'manual',utilizador:state.user.name,motivo_recusa:comentario,vendedor_email:getVendedorEmail(state.pipeline.find(p=>p.n_enc===m.enc)),email_phc:state.emailConfig.emailPHC,email_dcc:state.emailConfig.emailDCC,email_adm:state.emailConfig.emailADM,email_teste:state.emailConfig.emailTeste,modo_teste:state.emailConfig.modoTeste});
    } else if(m.type==='recusar'){
      const motivo=($('m-motivo')||{}).value||'';
      if(!motivo.trim()){ alert('O motivo é obrigatório.'); return; }
      updateEstado(m.enc,'recusada');
      writeDecisao({action:'decisao',n_encomenda:m.enc,empresa:m.empresa||'',nif:m.nif||'',nome:m.nome||'',valor:m.valor||'',estado:'recusada',tipo_aprovacao:'manual',utilizador:state.user.name,motivo_recusa:motivo,vendedor_email:getVendedorEmail(state.pipeline.find(p=>p.n_enc===m.enc)),email_phc:state.emailConfig.emailPHC,email_dcc:state.emailConfig.emailDCC,email_adm:state.emailConfig.emailADM,email_teste:state.emailConfig.emailTeste,modo_teste:state.emailConfig.modoTeste});
    } else if(m.type==='revisao'){
      const questao=($('m-questao')||{}).value||'';
      if(!questao.trim()){ alert('Escreve a questão antes de enviar.'); return; }
      updateEstado(m.enc,'em_revisao');
      const enc=state.pipeline.find(p=>p.n_enc===m.enc);
      if(enc){ if(!enc.revisao) enc.revisao={}; if(!enc.revisao.questao_1){ enc.revisao.questao_1=questao; enc.revisao.data_q1=new Date().toLocaleString('pt-PT'); } else { enc.revisao.questao_2=questao; enc.revisao.data_q2=new Date().toLocaleString('pt-PT'); } enc.revisao.estado='pendente'; }
      writeDecisao({action:'revisao_questao',n_encomenda:m.enc,nif:m.nif||'',nome:m.nome||'',empresa:m.empresa||'',valor:m.valor||'',vendedor:m.vendedor||'',questao,utilizador:state.user.name,email_dcc:state.emailConfig.emailDCC,email_teste:state.emailConfig.emailTeste,modo_teste:state.emailConfig.modoTeste});
      writeDecisao({action:'decisao',n_encomenda:m.enc,empresa:m.empresa||'',nif:m.nif||'',nome:m.nome||'',valor:m.valor||'',estado:'em_revisao',tipo_aprovacao:'manual',utilizador:state.user.name});
    }
    state.modal=null; render();
  };
  // Select all checkbox
  const selAll=$('sel-all');
  if(selAll) selAll.onchange=()=>{
    document.querySelectorAll('input[name="enc-sel"]').forEach(cb=>{ cb.checked=selAll.checked; });
  };

  // Confirm selection button
  const mConfirmSel=$('m-confirm-sel');
  if(mConfirmSel) mConfirmSel.onclick=async ()=>{
    const m=state.modal;
    const selected=[...document.querySelectorAll('input[name="enc-sel"]:checked')].map(cb=>cb.value);
    if(selected.length===0){ alert('Selecciona pelo menos uma encomenda.'); return; }
    if(m.accao==='revisao'){
      // For revisao, only 1 at a time - open revisao modal
      const e=state.pipeline.find(p=>p.n_enc===selected[0]);
      if(e){ state.modal={type:'revisao',enc:e.n_enc,nif:e.nif,nome:e.nome,empresa:e.empresa,valor:String(e.valor),vendedor:e.vendedor,ronda:1}; render(); }
      return;
    }
    // For aprovar/recusar - process all selected
    if(m.accao==='aprovar'){
      state.modal=null;
      const promises=selected.map(enc_sel=>{
        const e=state.pipeline.find(p=>p.n_enc===enc_sel);
        if(!e) return;
        updateEstado(enc_sel,'aprovada');
        return writeDecisao({action:'decisao',n_encomenda:enc_sel,empresa:e.empresa,nif:e.nif,nome:e.nome,valor:String(e.valor),estado:'aprovada',tipo_aprovacao:'manual',utilizador:state.user.name,motivo_recusa:'',vendedor_email:getVendedorEmail(e),email_phc:state.emailConfig.emailPHC,email_dcc:state.emailConfig.emailDCC,email_adm:state.emailConfig.emailADM,email_teste:state.emailConfig.emailTeste,modo_teste:state.emailConfig.modoTeste});
      });
      await Promise.all(promises);
      alert(selected.length+' encomenda(s) aprovada(s).');
      render();
    } else if(m.accao==='recusar'){
      // Need motivo - open recusar modal for batch
      state.modal={type:'recusar_batch',encs:selected,nif:m.nif};
      render();
    }
  };

  const overlay=$('overlay');
  if(overlay) overlay.onclick=e=>{ if(e.target===overlay){ state.modal=null; render(); } };
  document.querySelectorAll('.link-antig-analise').forEach(a=>{
    a.onclick=e=>{ e.preventDefault(); const nif=a.dataset.nif; state.tab='analise'; state.nifAnalise=nif; state.analiseData=calcAnalise(nif); state.searchResults=null; render(); };
  });

  const fBtnAntig=$('btn-filtrar-antig');
  if(fBtnAntig) fBtnAntig.onclick=()=>{
    state.antigFilter={
      emp: ($('f-emp')||{}).value||'',
      antig: ($('f-antig')||{}).value||'',
      vend: ($('f-vend')||{}).value||''
    };
    render();
  };
  const fLimparAntig=$('btn-limpar-antig');
  if(fLimparAntig) fLimparAntig.onclick=()=>{ state.antigFilter=null; render(); };

  const tog=$('toggle-regra');
  if(tog) tog.onclick=()=>tog.classList.toggle('on');

  const btnSaveDcc=$('btn-save-dcc-config');
  if(btnSaveDcc) btnSaveDcc.onclick=async ()=>{
    const valor=parseFloat(($('cfg-dcc-valor')||{}).value||3500);
    const dias=parseInt(($('cfg-dcc-dias')||{}).value||3);
    if(isNaN(valor)||isNaN(dias)){ alert('Valores inválidos.'); return; }
    state.dccConfig.limiteValor=valor;
    state.dccConfig.limiteDias=dias;
    console.log('Saving config:', valor, dias);
    const ok = await writeDecisao({action:'saveConfig',limiteValor:valor,limiteDias:dias,utilizador:state.user.name});
    console.log('Save result:', ok);
    const saved=$('cfg-dcc-saved');
    if(saved){ saved.style.display='inline'; setTimeout(()=>{ saved.style.display='none'; },2000); }
    render();
  };
}

function updateEstado(enc, novoEstado) {
  const e=state.pipeline.find(p=>p.n_enc===enc);
  if(e){ e.estado=novoEstado; render(); }
}

// Global event delegation for dynamically rendered buttons
document.addEventListener('click', async function(ev) {
  // Toggle modo teste
  if (ev.target.closest('#toggle-modo-teste')) {
    state.emailConfig.modoTeste = state.emailConfig.modoTeste === 'SIM' ? 'NAO' : 'SIM';
    render(); return;
  }
  // Save email config
  if (ev.target.closest('#btn-save-email-config')) {
    const phc = (document.getElementById('cfg-email-phc')||{}).value||'';
    const teste = (document.getElementById('cfg-email-teste')||{}).value||'';
    state.emailConfig.emailPHC = phc;
    state.emailConfig.emailTeste = teste;
    await writeDecisao({action:'saveConfig',
      emailPHC: phc, emailTeste: teste,
      modoTeste: state.emailConfig.modoTeste,
      utilizador: state.user ? state.user.name : ''
    });
    const saved = document.getElementById('cfg-email-saved');
    if (saved){ saved.style.display='inline'; setTimeout(()=>{ saved.style.display='none'; },2000); }
    return;
  }
  const btn = ev.target.closest('#btn-save-dcc-config');
  if (!btn) return;
  const valor = parseFloat((document.getElementById('cfg-dcc-valor')||{}).value||3500);
  const dias = parseInt((document.getElementById('cfg-dcc-dias')||{}).value||3);
  if (isNaN(valor)||isNaN(dias)){ alert('Valores inválidos.'); return; }
  state.dccConfig.limiteValor = valor;
  state.dccConfig.limiteDias = dias;
  console.log('Saving config:', valor, dias);
  const ok = await writeDecisao({action:'saveConfig',limiteValor:valor,limiteDias:dias,utilizador:state.user.name});
  console.log('Save result:', ok);
  const saved = document.getElementById('cfg-dcc-saved');
  if (saved){ saved.style.display='inline'; setTimeout(()=>{ saved.style.display='none'; },2000); }
});

render();
</script>
